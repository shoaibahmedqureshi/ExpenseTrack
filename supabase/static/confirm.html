<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<style>
  body {
    font-family: -apple-system, Roboto, Helvetica, Arial, sans-serif;
    background: #f5f5f7;
    margin: 0;
    padding: 40px 20px;
    text-align: center;
    color: #1c1c1e;
  }
  .card {
    max-width: 420px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    padding: 32px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .icon {
    font-size: 48px;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 12px;
  }
  p {
    font-size: 15px;
    line-height: 1.5;
    color: #555;
    margin: 0 0 16px;
  }
  a.button, button.button {
    display: inline-block;
    background: #6C63FF;
    color: #fff;
    text-decoration: none;
    padding: 12px 24px;
    border-radius: 10px;
    font-weight: 600;
    margin-top: 8px;
    border: none;
    font-size: 15px;
    cursor: pointer;
    width: 100%;
  }
  button.button:disabled {
    opacity: 0.6;
  }
  .hint {
    font-size: 13px;
    color: #888;
    margin-top: 20px;
  }
  input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 15px;
    margin-bottom: 12px;
    box-sizing: border-box;
  }
  .error {
    color: #c0392b;
    font-size: 13px;
    margin: -4px 0 12px;
    text-align: left;
  }
  .form-section { text-align: left; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon">&#9203;</div>
    <h1>Loading…</h1>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var SUPABASE_URL = "https://xgavxbuezmivnseyhkye.supabase.co";
    var SUPABASE_PUBLISHABLE_KEY = "sb_publishable_cTHDiUVcracNw3eF9w5ATQ_Pd7Afi5Y";
    var DEEP_LINK_BASE = "io.supabase.expensetracker://login-callback";

    var card = document.getElementById("card");

    function parseHashParams() {
      var hash = window.location.hash.replace(/^#/, "");
      var params = {};
      hash.split("&").forEach(function (pair) {
        if (!pair) return;
        var idx = pair.indexOf("=");
        var key = decodeURIComponent(pair.slice(0, idx));
        var value = decodeURIComponent(pair.slice(idx + 1));
        params[key] = value;
      });
      return params;
    }

    function attemptDeepLink() {
      var params = window.location.hash || window.location.search;
      var deepLink = DEEP_LINK_BASE + params;
      setTimeout(function () {
        window.location.href = deepLink;
      }, 400);
      return deepLink;
    }

    function showConfirmed() {
      var deepLink = attemptDeepLink();
      card.innerHTML =
        '<div class="icon">&#9989;</div>' +
        '<h1>Email confirmed!</h1>' +
        '<p>Your Expense Tracker account is verified and ready to use.</p>' +
        '<p>If the app is installed on this device, it should open automatically. Otherwise, open the ' +
        '<strong>Expense Tracker</strong> app on your phone and sign in with your email and password.</p>' +
        '<a class="button" href="' + deepLink + '">Open Expense Tracker</a>' +
        '<p class="hint">You can close this page and switch to the app.</p>';
    }

    function showRecoveryForm(supabase) {
      card.innerHTML =
        '<div class="icon">&#128272;</div>' +
        '<h1>Set a new password</h1>' +
        '<p>Choose a new password for your Expense Tracker account.</p>' +
        '<div class="form-section">' +
        '  <input type="password" id="pw1" placeholder="New password" minlength="6" />' +
        '  <input type="password" id="pw2" placeholder="Confirm new password" minlength="6" />' +
        '  <div class="error" id="err" style="display:none;"></div>' +
        '  <button class="button" id="submitBtn">Update password</button>' +
        '</div>' +
        '<p class="hint">You can also finish this in the app if it\'s installed on this device.</p>';

      var pw1 = document.getElementById("pw1");
      var pw2 = document.getElementById("pw2");
      var err = document.getElementById("err");
      var btn = document.getElementById("submitBtn");

      btn.addEventListener("click", function () {
        err.style.display = "none";
        if (pw1.value.length < 6) {
          err.textContent = "Password must be at least 6 characters.";
          err.style.display = "block";
          return;
        }
        if (pw1.value !== pw2.value) {
          err.textContent = "Passwords do not match.";
          err.style.display = "block";
          return;
        }
        btn.disabled = true;
        btn.textContent = "Updating…";
        supabase.auth.updateUser({ password: pw1.value }).then(function (res) {
          if (res.error) {
            err.textContent = res.error.message;
            err.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Update password";
            return;
          }
          card.innerHTML =
            '<div class="icon">&#9989;</div>' +
            '<h1>Password updated!</h1>' +
            '<p>You can now sign in with your new password in the Expense Tracker app.</p>';
        });
      });
    }

    function showError(message) {
      card.innerHTML =
        '<div class="icon">&#9888;&#65039;</div>' +
        '<h1>Something went wrong</h1>' +
        '<p>' + message + '</p>';
    }

    var params = parseHashParams();

    if (params.error) {
      showError(params.error_description || "This link is invalid or has expired. Please request a new one.");
    } else if (params.type === "recovery" && params.access_token) {
      var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
      supabase.auth
        .setSession({
          access_token: params.access_token,
          refresh_token: params.refresh_token,
        })
        .then(function (res) {
          if (res.error) {
            showError("This reset link is invalid or has expired. Please request a new one.");
            return;
          }
          showRecoveryForm(supabase);
        });
    } else {
      showConfirmed();
    }
  </script>
</body>
</html>
